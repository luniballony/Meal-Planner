<!DOCTYPE html>
<html>
  <head>
    <title>Meal Planner - Create New Account</title>
    <link rel="stylesheet" href="createAccount.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <style>
      body{background-image: url('1.png')}
    </style>
  </head>
  <body>
    <button class="go-back-button">Go Back</button>

    <div class="create-new-account-box">
      <p class="create-new-account-text">Create New Account</p>

      <label>Name</label>
      <input class="input-name" 
        placeholder="Please enter your name here">

      <label>Email</label>
      <input class="input-email" 
        type="email" 
        placeholder="Please enter your Email here">
      
      <label>Password</label>
      <input class="input-password" 
        type="password" 
        minlength="8"
        placeholder="Please enter your password here">

      <label>Re-enter Password</label>
      <input class="input-password" 
          type="password" 
          minlength="8"
          placeholder="Please re-enter the password here">
      
    
      <button class="create-new-account-button">Create New Account</button>
    </div>
  </body>
</html>
